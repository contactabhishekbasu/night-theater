<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="bm-title bm-desc">
  <title id="bm-title">Backyard Meridian mark</title>
  <desc id="bm-desc">A star at the apex of a meridian arc descending to a home and backyard fence on the horizon.</desc>
  <defs>
    <clipPath id="bm-disc"><circle cx="32" cy="32" r="29"/></clipPath>
  </defs>
  <circle cx="32" cy="32" r="29" fill="#0b0b0b" stroke="#2c2c2a" stroke-width="1"/>
  <g clip-path="url(#bm-disc)">
    <!-- meridian vesica: green upper span resolving to blue near the horizon -->
    <path d="M29 51 C22 44 21 40 21 34 C21 27 26 21 31.4 17.5" fill="none" stroke="#199e70" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M35 51 C42 44 43 40 43 34 C43 27 38 21 32.6 17.5" fill="none" stroke="#199e70" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M29 51 C24.5 46.5 22.6 43.5 21.7 40" fill="none" stroke="#3987e5" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M35 51 C39.5 46.5 41.4 43.5 42.3 40" fill="none" stroke="#3987e5" stroke-width="2.4" stroke-linecap="round"/>
    <!-- star point at the apex -->
    <path d="M32 8 L33.6 14.4 L40 16 L33.6 17.6 L32 24 L30.4 17.6 L24 16 L30.4 14.4 Z" fill="#ffffff"/>
    <!-- backyard fence along the horizon -->
    <g stroke="#8a8a84" stroke-width="1.3" stroke-linecap="round">
      <path d="M6 51 H58"/>
      <path d="M10 48.5v5M14 48.5v5M18 48.5v5M22 48.5v5M42 48.5v5M46 48.5v5M50 48.5v5M54 48.5v5"/>
    </g>
    <!-- home -->
    <path d="M24.5 51 L32 44 L39.5 51 Z" fill="#c9c8c0"/>
    <rect x="27.5" y="50.5" width="9" height="7.5" fill="#c9c8c0"/>
    <rect x="35.6" y="46" width="2.4" height="5" fill="#c9c8c0"/>
  </g>
</svg>
